# TODO configure this file as trusted publisher and test it
# when @iexec-nox/nox-contracts is created on NPM registry.

name: Publish NPM Package

on:
  push:
    tags:
      - "v*"

jobs:
  pre-publish:
    uses: ./.github/workflows/main.yml

  determine-tag:
    needs: pre-publish
    runs-on: ubuntu-latest
    outputs:
      TAG: ${{ steps.set-dist-tag.outputs.TAG }}
    steps:
      - name: Determine package dist tag
        id: set-dist-tag
        run: |
          if [[ "${GITHUB_REF#refs/tags/}" == *"-rc"* ]]; then
            echo "TAG=rc" >> $GITHUB_OUTPUT
          else
            echo "TAG=latest" >> $GITHUB_OUTPUT
          fi

  publish:
    needs: determine-tag
    permissions:
      id-token: write # Required for OIDC
      packages: write
      contents: read
    uses: iExecBlockchainComputing/github-actions-workflows/.github/workflows/publish-npm.yml@publish-npm-v1.6.0
    with:
      tag: ${{ needs.determine-tag.outputs.TAG }}
