name: Nox Contracts CI

on:
  push:
    branches:
      - main # To trigger coverage updates of `main` on Codecov
  pull_request:
  workflow_call:

concurrency:
  group: ${{ github.ref }}-ci
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          # cache: 'pnpm' TODO

      - run: corepack enable # Use package manager defined in package.json

      - run: pnpm install --frozen-lockfile

      - name: Check code formatting
        run: pnpm run format:check

      - name: Check licenses
        run: pnpm dlx license-checker@25.0.1 --onlyAllow 'MIT;Apache-2.0'

      - name: Build
        run: pnpm run build

      - name: Run coverage
        run: pnpm run coverage

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v4.0.1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: ${{ github.repository }}

      - name: Get Solc version
        id: get-solc-version
        run: echo "version=$(cat .solc.json | jq -r .version)" >> $GITHUB_OUTPUT

      - name: Run static analysis with Slither
        uses: crytic/slither-action@v0.4.1
        with:
          target: "contracts/"
          solc-version: ${{ steps.get-solc-version.outputs.version }}
          slither-args: >
            --checklist
            --markdown-root ${{ github.server_url }}/${{ github.repository }}/blob/${{ github.sha }}/
            --solc-remaps "forge-std/=node_modules/forge-std/src/ @openzeppelin/=node_modules/@openzeppelin/"
            --solc-args "--optimize --via-ir"
            --filter-paths "node_modules/|contracts/.*\.t\.sol"
          fail-on: high
          sarif: results.sarif

      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
